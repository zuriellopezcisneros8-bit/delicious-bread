<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delicious Bread - Crear Cuenta</title>
    <style>
        :root { --bg-dark: #0d0d0d; --panel-bg: #141414; --accent-gold: #d4af37; --text-light: #f5f5f5; }
        body { background-color: var(--bg-dark); font-family: 'Helvetica Neue', Arial, sans-serif; color: var(--text-light); margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-card { background: var(--panel-bg); padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid #262626; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-family: 'Georgia', serif; text-align: center; color: var(--text-light); letter-spacing: 2px; font-size: 1.8rem; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #8c7853; font-size: 0.9rem; margin-top: 0; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .form-control { width: 100%; padding: 12px; background: #080808; border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; font-size: 1rem; transition: border-color 0.3s; }
        .form-control:focus { border-color: var(--accent-gold); outline: none; }
        .btn-submit { width: 100%; padding: 14px; background: var(--accent-gold); border: none; color: #000; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; transition: background 0.3s; }
        .btn-submit:hover { background: #bfa02c; }
        .footer-text { text-align: center; margin-top: 25px; font-size: 0.9rem; color: #666; }
        .footer-text a { color: var(--accent-gold); text-decoration: none; }
        .alert { background: #7f1d1d; color: #fca5a5; padding: 12px; border-radius: 6px; font-size: 0.9rem; margin-bottom: 20px; text-align: center; border: 1px solid #991b1b; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>DELICIOUS BREAD</h1>
        <p class="subtitle">Alta Panificación Artesanal</p>
        
        {% with messages = get_flashed_messages(category_filter=["error"]) %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('registro') }}" method="POST">
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" name="nombre" class="form-control" required placeholder="Ej. Zuriel López">
            </div>
            <div class="form-group">
                <label>Teléfono Celular</label>
                <input type="tel" name="telefono" class="form-control" required placeholder="10 dígitos para alertas">
            </div>
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" name="correo" class="form-control" required placeholder="Para envío de recibos corporativos">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="contrasena" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit">Registrar e Ingresar</button>
        </form>
        <div class="footer-text">
            ¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión aquí</a>
        </div>
    </div>
</body>
</html>
