<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELICIOUS BREAD | Acceso</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-beige: #EADBC8;
            --card-black: #000000;
            --skin-beige: #dfd0c0;
            --light-brown: #8b7355;
            --luxury-gold: #c5a880;
            --border-fino: #222222;
            --text-dark: #1A1A1A;
            --transition-smooth: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-beige);
            color: var(--text-dark);
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: var(--card-black);
            padding: 50px 40px;
            border-radius: 4px;
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border-fino);
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            color: var(--skin-beige);
            letter-spacing: 4px;
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 400;
        }

        p.subtitle {
            text-align: center;
            color: var(--light-brown);
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--light-brown);
            font-weight: 500;
        }

        .form-control {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--light-brown);
            color: var(--skin-beige);
            padding: 10px 0;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            width: 100%;
            transition: var(--transition-smooth);
            border-radius: 0;
        }

        .form-control:focus {
            outline: none;
            border-bottom-color: var(--luxury-gold);
        }

        .form-control::placeholder {
            color: #333;
            font-style: italic;
            letter-spacing: 1px;
        }

        .btn-submit {
            background: var(--luxury-gold);
            border: none;
            color: var(--card-black);
            text-transform: uppercase;
            letter-spacing: 3px;
            padding: 18px 30px;
            cursor: pointer;
            transition: var(--transition-smooth);
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 4px;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--skin-beige);
        }

        .footer-text {
            text-align: center;
            margin-top: 30px;
            font-size: 0.75rem;
            color: #777;
            letter-spacing: 1px;
        }

        .footer-text a {
            color: var(--luxury-gold);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition-smooth);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-left: 5px;
        }

        .footer-text a:hover {
            color: var(--skin-beige);
        }

        .alert {
            background: #1a0f0f;
            color: #ff6b6b;
            padding: 15px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-bottom: 30px;
            text-align: center;
            border: 1px solid #4a1d1d;
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>DELICIOUS BREAD</h1>
        <p class="subtitle">Acceso de Clientes Especiales</p>
        
        {% with messages = get_flashed_messages(category_filter=["error"]) %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" name="correo" class="form-control" required placeholder="correo@ejemplo.com">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="contrasena" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit">Ingresar al Sistema</button>
        </form>
        <div class="footer-text">
            ¿No tiene cuenta? <a href="{{ url_for('registro') }}">Créala aquí</a>
        </div>
    </div>
</body>
</html>
